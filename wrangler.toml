# Hoja de instrucciones para Cloudflare: conecta la web con su BD (D1) y sus fotos (R2).
# Los IDs "PENDIENTE" se completan al crear los recursos en Cloudflare (Fase 1, paso final).

name = "tienda-virtual"
compatibility_date = "2026-07-01"
pages_build_output_dir = "dist"

# Base de datos (archivador de fichas: productos, precios, pedidos)
[[d1_databases]]
binding = "DB"
database_name = "tienda-virtual-db"
database_id = "cec65991-901c-4a32-898d-18e620a424ef"

# Almacén de fotos (disco en internet)
[[r2_buckets]]
binding = "FOTOS"
bucket_name = "tienda-virtual-fotos"
